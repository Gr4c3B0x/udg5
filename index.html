<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; height: 100%; }
        .page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fcf8f5; padding: 20px; box-sizing: border-box; }
        
        /* Style Cover */
        #cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: #fcf8f5; text-align: center; }
        
        /* Style Undangan */
        #undangan { display: none; text-align: center; }

        h1 { font-family: 'Dancing Script', cursive; color: #8b5e3c; font-size: 3em; }
        .btn { padding: 15px 30px; background: #8b5e3c; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1em; margin-top: 20px; }
        .nama-tamu { font-weight: 600; color: #8b5e3c; margin-bottom: 20px; }
        .timer { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .timer div { background: white; padding: 10px; border-radius: 10px; min-width: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- HALAMAN COVER -->
    <div id="cover" class="page">
        <p>Kepada Yth,</p>
        <div class="nama-tamu" id="namaTamu">Bapak/Ibu/Saudara/i</div>
        <h1>Andi & Bella</h1>
        <p>Kami mengundang Anda ke acara pernikahan kami</p>
        <button class="btn" onclick="bukaUndangan()">Buka Undangan</button>
    </div>

    <!-- HALAMAN UNDANGAN -->
    <div id="undangan" class="page">
        <h1>Menuju Hari Bahagia</h1>
        <div class="timer" id="countdown">
            <div><span id="days">00</span><br>Hari</div>
            <div><span id="hours">00</span><br>Jam</div>
            <div><span id="mins">00</span><br>Menit</div>
        </div>
        <a href="#" id="rsvpBtn" class="btn" style="text-decoration:none;">Konfirmasi Kehadiran</a>
    </div>

    <script>
        // 1. Ambil Nama
        const urlParams = new URLSearchParams(window.location.search);
        const nama = urlParams.get('nama');
        if (nama) document.getElementById('namaTamu').innerText = decodeURIComponent(nama);

        // 2. Fungsi Buka Undangan
        function bukaUndangan() {
            document.getElementById('cover').style.display = 'none';
            document.getElementById('undangan').style.display = 'flex';
        }

        // 3. Countdown (Sama seperti sebelumnya)
        const targetDate = new Date("Dec 31, 2026 09:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);

        // 4. RSVP WhatsApp
        const whatsappNumber = "628123456789"; 
        const rsvpMsg = `Halo, saya ${nama || 'Tamu'} akan hadir di pernikahan Andi & Bella.`;
        document.getElementById('rsvpBtn').href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(rsvpMsg)}`;
    </script>
</body>
</html>
