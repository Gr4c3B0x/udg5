<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #fdf6f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #d4a373; }
        .nama-tamu { color: #bc6c25; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Undangan Pernikahan</h1>
        <p>Kepada Yth,</p>
        <div class="nama-tamu" id="namaTamu">Tamu Undangan</div>
        <p>Dengan hormat, kami mengundang Anda untuk hadir di acara kami...</p>
    </div>

    <script>
        // Fungsi untuk mengambil parameter dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const nama = urlParams.get('nama');

        // Jika nama ditemukan di URL, tampilkan di elemen
        if (nama) {
            document.getElementById('namaTamu').innerText = decodeURIComponent(nama);
        }
    </script>
</body>
</html>
